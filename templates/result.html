<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Week in Review</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="result-header">
            <a href="/" class="back-link">← Back to Home</a>
            <span class="badge badge-{{ mode }}">{{ mode | upper }} MODE</span>
        </header>

        <main class="story-container">
            {{ story | safe }}
        </main>

        <footer>
            <p>Generated by <strong>Week in Review</strong> | 
               Data: <strong>Microsoft Work IQ</strong> | 
               AI: <strong>GitHub Models</strong></p>
            <form action="/generate{% if mode == 'demo' %}-demo{% endif %}" method="post" style="margin-top: 1rem;">
                <button type="submit" class="btn btn-primary">🔄 Regenerate</button>
            </form>
        </footer>
    </div>
</body>
</html>
